name: AI Tech News Generator

on:
  schedule:
    # Run every Friday at 9:00 AM UTC
    - cron: '0 9 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tech-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate tech news post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python << 'PYEOF'
          import anthropic
          import os
          import datetime

          client = anthropic.Anthropic()
          today = datetime.date.today()
          week_start = today - datetime.timedelta(days=today.weekday())
          week_label = week_start.strftime("%B %d, %Y")

          prompt = f"""Write a weekly tech news roundup blog post for a DevOps/AIOps audience.
          Date: Week of {week_label}

          Requirements:
          - Title format: "DevOps & Cloud Weekly: Week of {week_label}"
          - Cover 5-6 news items across: Kubernetes, cloud providers, observability, AI/ML ops, DevOps tools, security
          - For each item: headline, 2-3 sentence summary, and a "Why it matters" line
          - Start with 1-2 sentence intro (appears in blog listing)
          - Add <!-- truncate --> after intro
          - End with a brief "Trend Watch" section (2-3 observations)
          - Tone: informative, concise, practitioner-focused
          - Do NOT include frontmatter — I will add it
          - Base the news on realistic and plausible developments in the DevOps/cloud space

          Write the blog post content only:"""

          response = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=3000,
              messages=[{"role": "user", "content": prompt}],
          )

          content = response.content[0].text.strip()
          slug = f"devops-cloud-weekly-{today.isoformat()}"
          title = f"DevOps & Cloud Weekly: Week of {week_label}"

          frontmatter = f"""---
          title: "{title}"
          slug: {slug}
          authors: [aiopsvista]
          tags: [tech-news, devops, cloud]
          description: "Weekly roundup of DevOps, cloud, and AIOps news for the week of {week_label}."
          ---"""

          frontmatter = "\n".join(line.strip() for line in frontmatter.split("\n"))
          full_post = f"{frontmatter}\n\n{content}\n"

          filename = f"{today.isoformat()}-weekly-news.md"
          filepath = f"website/blog/{filename}"

          with open(filepath, "w") as f:
              f.write(full_post)

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"NEWS_FILE={filepath}\n")
              f.write(f"NEWS_TITLE={title}\n")
              f.write(f"NEWS_SLUG={slug}\n")

          print(f"Generated: {filepath}")
          PYEOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "news: ${{ env.NEWS_TITLE }}"
          title: "📰 ${{ env.NEWS_TITLE }}"
          body: |
            ## AI-Generated Weekly News Roundup

            **File:** `${{ env.NEWS_FILE }}`

            Weekly tech news generated by the AI content pipeline.
            Please review before merging.

            - [ ] News items are accurate
            - [ ] Links are correct
            - [ ] Formatting is clean
          branch: news/${{ env.NEWS_SLUG }}
          labels: tech-news, ai-generated
